# This flow tests the purchase through paywall flow.
# It navigates to the purchase screen, presents the paywall, makes a
# purchase, and verifies entitlements update.
#
# Unity UGUI renders on a single GLSurfaceView, so elements are not
# exposed to the accessibility tree. UGUI interactions use coordinate-based
# taps derived from the RectTransform anchors in SceneSetup.cs.
# The RevenueCat paywall uses native views and supports text-based assertions.

appId: com.revenuecat.automatedsdktests
name: Purchase through paywall

---
- clearState
- pressKey: home
- launchApp
- waitForAnimationToEnd:
    timeout: 15000

# Tap "Purchase through paywall" button (UGUI)
# SceneSetup.cs anchors: (0.1, 0.3)-(0.9, 0.4) → center at 65% from top
- tapOn:
    point: "50%,65%"
- waitForAnimationToEnd:
    timeout: 5000

# Tap "Present Paywall" button (UGUI)
# SceneSetup.cs anchors: (0.1, 0.4)-(0.9, 0.5) → center at 55% from top
- tapOn:
    point: "50%,55%"

# Paywall is a native view — text-based assertions work here
- extendedWaitUntil:
    visible: "Paywall V2"
    timeout: 15000
- assertVisible: "Paywall V2"
- tapOn:
    text: "Yearly"
- tapOn:
    text: "Continue"
- runFlow:
    file: ../utils/confirm_purchase.yaml
# After purchase dismissal, wait for entitlements update.
# The label is UGUI so this may not be visible via accessibility tree.
# Use a long timeout to allow for both native and UGUI detection.
- extendedWaitUntil:
    visible: "Entitlements: pro"
    timeout: 30000
